<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ company }}</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .chat-area { height: calc(100vh - 180px); overflow-y: auto; scroll-behavior: smooth; }
  .msg-enter { animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,80%,100% { opacity:0.3; } 40% { opacity:1; } }
  .dot { animation: pulse 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .source-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  #query-input:focus { outline: none; box-shadow: 0 0 0 2px #2563eb; }
  .filter-select { background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  .mode-btn { padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: #2563eb; color: white; }
  .mode-btn:not(.active) { background: #f1f5f9; color: #475569; }
  .answer-text p { margin-bottom: 0.5rem; }
  .answer-text strong { font-weight: 600; }
  .sources-panel { background: #f0f7ff; border: 1.5px solid #bfdbfe; border-radius: 10px; width: 280px; min-width: 240px; flex-shrink: 0; font-size: 12px; }
  .doc-item { background: white; border: 1px solid #dbeafe; border-radius: 6px; padding: 6px 8px; transition: all 0.15s; }
  .doc-item:hover { border-color: #93c5fd; }
  .doc-btn { font-size: 10px; padding: 3px 7px; border-radius: 4px; cursor: pointer; transition: all 0.1s; }
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

<header class="bg-gray-800 text-white px-6 py-3 flex items-center justify-between flex-shrink-0">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-sm">AI</div>
    <div>
      <h1 class="text-lg font-semibold leading-tight">{{ company }}</h1>
      <p class="text-xs text-gray-400">Vertex AI Search + Gemini</p>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button onclick="newChat()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs font-medium transition">+ New</button>
    <span id="badge" class="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-400 hidden"></span>
    <select id="filter-property" class="filter-select text-gray-700">
      <option value="">All properties</option>
      {% for p in properties %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
    </select>
    <select id="filter-doctype" class="filter-select text-gray-700">
      <option value="">All types</option>
      {% for d in doc_types %}<option value="{{ d }}">{{ d }}</option>{% endfor %}
    </select>
    <div class="flex gap-1 ml-1">
      <button class="mode-btn active" data-mode="answer" onclick="setMode('answer')">Answer</button>
      <button class="mode-btn" data-mode="search" onclick="setMode('search')">Search</button>
    </div>
  </div>
</header>

<div id="chat-area" class="chat-area flex-1 px-4 md:px-6 lg:px-10 py-6">
  <div class="max-w-5xl mx-auto text-center py-12 msg-enter" id="welcome">
    <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <h2 class="text-xl font-semibold text-gray-700 mb-2">Ask anything about your documents</h2>
    <p class="text-gray-500 text-sm">Source documents shown with every answer. Download or email them instantly.</p>
    <div class="flex flex-wrap justify-center gap-2 mt-6">
      <button onclick="ask('How much was the electrical inspection invoice?')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-blue-50 hover:border-blue-200 transition">Electrical inspection?</button>
      <button onclick="ask('What is the EIN for Shearwater Way LLC?')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-blue-50 hover:border-blue-200 transition">EIN number?</button>
      <button onclick="ask('Tell me about the Northridge closing')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-blue-50 hover:border-blue-200 transition">Northridge closing?</button>
      <button onclick="ask('Summarize the latest P&L')" class="px-3 py-1.5 bg-white border border-gray-200 rounded-full text-sm text-gray-600 hover:bg-blue-50 hover:border-blue-200 transition">Latest P&amp;L?</button>
    </div>
  </div>
</div>

<div class="flex-shrink-0 border-t border-gray-200 bg-white px-4 md:px-6 lg:px-10 py-3">
  <div class="max-w-5xl mx-auto flex gap-3">
    <input id="query-input" type="text" placeholder="Ask a question..."
           class="flex-1 px-4 py-2.5 rounded-xl border border-gray-300 text-sm"
           onkeydown="if(event.key==='Enter')sendQuery()">
    <button onclick="sendQuery()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700 transition flex-shrink-0">Ask</button>
  </div>
</div>

<script>
// ---- state ----
let mode = 'answer', session = null, panelN = 0;
const srcStore = {};  // panelId -> sources array (avoids inline JSON in onclick)

function savedEmail() { try { return localStorage.getItem('smb_email')||''; } catch(e) { return ''; } }
function saveEmail(v) { try { localStorage.setItem('smb_email', v); } catch(e) {} }

// ---- helpers ----
function setMode(m) { mode=m; document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m)); }
function newChat() { session=null; location.reload(); }
function ask(q) { document.getElementById('query-input').value=q; sendQuery(); }
function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function scroll() { const a=document.getElementById('chat-area'); a.scrollTop=a.scrollHeight; }
function badge() { const b=document.getElementById('badge'); if(session){b.classList.remove('hidden','bg-gray-700','text-gray-400');b.classList.add('bg-green-700','text-green-300');b.textContent='● session';}else b.classList.add('hidden'); }

function addMsg(role, html) {
  const w=document.getElementById('welcome'); if(w) w.remove();
  const el=document.createElement('div');
  el.className='max-w-5xl mx-auto mb-4 msg-enter';
  el.innerHTML = role==='user'
    ? `<div class="flex justify-end"><div class="bg-blue-600 text-white px-4 py-2.5 rounded-2xl rounded-br-md max-w-lg text-sm">${esc(html)}</div></div>`
    : `<div class="flex justify-start w-full">${html}</div>`;
  document.getElementById('chat-area').appendChild(el);
  scroll();
  return el;
}
function addDots() {
  return addMsg('bot','<div class="bg-white border border-gray-200 px-4 py-3 rounded-2xl rounded-bl-md text-sm shadow-sm inline-block"><div class="flex gap-1.5"><div class="dot w-2 h-2 bg-gray-400 rounded-full"></div><div class="dot w-2 h-2 bg-gray-400 rounded-full"></div><div class="dot w-2 h-2 bg-gray-400 rounded-full"></div></div></div>');
}

function fmtText(text) {
  let h=esc(text);
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/\n\n/g,'</p><p>');
  h=h.replace(/\n/g,'<br>');
  return '<div class="answer-text"><p>'+h+'</p></div>';
}

// ---- build the two-column response ----
function buildResp(answerHtml, sources) {
  panelN++;
  const pid = 'p'+panelN;
  srcStore[pid] = sources || [];

  let panel = '';
  if (sources && sources.length) {
    let docs = '';
    for (const s of sources) {
      const t = s.title || s.filename || '(untitled)';
      const tag = [s.property, s.category||s.doc_type].filter(Boolean).join(' / ');
      const uri = s.uri || '';
      docs += `<div class="doc-item mb-1.5">
        <p class="font-medium text-gray-700 truncate leading-tight" title="${esc(t)}">📎 ${esc(t)}</p>
        ${tag ? '<p class="text-gray-400 mt-0.5" style="font-size:10px">'+esc(tag)+'</p>' : ''}
        ${uri ? '<div class="flex gap-1 mt-1"><button class="doc-btn bg-green-50 text-green-700 border border-green-200 hover:bg-green-100" onclick="dlDoc(this)" data-uri="'+esc(uri)+'" data-name="'+esc(t)+'">⬇ Download</button></div>' : ''}
      </div>`;
    }

    panel = `<div class="sources-panel p-3 ml-3">
      <p class="font-bold text-blue-700 uppercase tracking-wider mb-2" style="font-size:10px">📄 ${sources.length} doc${sources.length>1?'s':''} used</p>
      <div class="mb-2">
        <input id="em-${pid}" type="email" placeholder="email@company.com" value="${esc(savedEmail())}"
               class="w-full px-2 py-1.5 border border-blue-200 rounded bg-white text-xs mb-1">
        <button onclick="emailAll('${pid}')"
                class="w-full px-2 py-1.5 bg-blue-600 text-white rounded text-xs font-medium hover:bg-blue-700 transition">
          ✉ Email these documents
        </button>
      </div>
      <div class="overflow-y-auto" style="max-height:300px">${docs}</div>
    </div>`;
  }

  return `<div class="flex items-start gap-0 w-full">
    <div class="bg-white border border-gray-200 px-4 py-3 rounded-2xl rounded-bl-md text-sm text-gray-800 shadow-sm flex-1 min-w-0">${answerHtml}</div>
    ${panel}
  </div>`;
}

// ---- actions ----
async function dlDoc(btn) {
  const uri = btn.dataset.uri;
  try {
    const r = await fetch('/api/download?uri='+encodeURIComponent(uri));
    const d = await r.json();
    if (d.url) window.open(d.url, '_blank');
    else alert(d.error || 'Download failed');
  } catch(e) { alert('Download failed: '+e.message); }
}

async function emailAll(pid) {
  const input = document.getElementById('em-'+pid);
  const to = (input ? input.value : '').trim();
  if (!to) { alert('Enter an email address'); if(input) input.focus(); return; }
  saveEmail(to);

  const sources = srcStore[pid] || [];
  if (!sources.length) { alert('No documents to email'); return; }

  // Show a sending state on the button
  const btn = input.nextElementSibling;
  const origText = btn.textContent;
  btn.textContent = '⏳ Generating links...';
  btn.disabled = true;

  let lines = [];
  for (const s of sources) {
    if (!s.uri) continue;
    try {
      const r = await fetch('/api/download?uri='+encodeURIComponent(s.uri));
      const d = await r.json();
      if (d.url) lines.push((s.title||'Document') + '\n' + d.url);
    } catch(e) {}
  }

  btn.textContent = origText;
  btn.disabled = false;

  if (!lines.length) { alert('Could not generate download links'); return; }

  const subject = encodeURIComponent(lines.length + ' document' + (lines.length>1?'s':'') + ' from AI Search');
  const body = encodeURIComponent('Here are the documents from your search:\n\n' + lines.join('\n\n') + '\n\nLinks expire in 1 hour.\n');
  window.location.href = 'mailto:' + encodeURIComponent(to) + '?subject=' + subject + '&body=' + body;
}

// ---- main query ----
async function sendQuery() {
  const input = document.getElementById('query-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  addMsg('user', q);
  const dots = addDots();

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        query: q, mode: mode,
        property: document.getElementById('filter-property').value,
        doc_type: document.getElementById('filter-doctype').value,
        session: session,
      }),
    });
    const data = await resp.json();
    dots.remove();

    if (data.error) { addMsg('bot','<div class="bg-red-50 border border-red-200 px-4 py-3 rounded-2xl text-sm text-red-700">'+esc(data.error)+'</div>'); return; }
    if (data.session) { session=data.session; badge(); }

    if (data.mode === 'search') {
      const srcs = (data.results||[]).map(r=>({title:r.filename,property:r.property,category:r.doc_type,uri:r.uri}));
      addMsg('bot', buildResp(
        srcs.length ? '<p class="text-gray-600">Found '+srcs.length+' matching documents.</p>' : '<p class="text-gray-500">No results found.</p>',
        srcs
      ));
    } else {
      addMsg('bot', buildResp(fmtText(data.text || 'No answer could be generated.'), data.sources));
    }
  } catch(err) {
    dots.remove();
    addMsg('bot','<div class="bg-red-50 border border-red-200 px-4 py-3 rounded-2xl text-sm text-red-700">'+esc(err.message)+'</div>');
  }
}
</script>
</body>
</html>

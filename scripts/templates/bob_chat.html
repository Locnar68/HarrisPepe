<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Madison Ave — Job Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1114;--surface:#181b20;--surface2:#1f2228;--border:#2c3038;
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--amber-glow:rgba(245,166,35,0.05);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);
  --orange:#fb923c;--red-dim:rgba(248,113,113,0.12);
  --text:#dde1e7;--muted:#6b7280;--dim:#9aa0a8;
  --user-bg:#1e3a5f;--user-border:#2d5a8c;
  --font-head:'Oswald',sans-serif;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;overflow:hidden}
.app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:240px 1fr;height:100vh}
/* Header */
.header{grid-column:1/-1;display:flex;align-items:center;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px}
.logo{width:32px;height:32px;background:var(--amber);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:18px;height:18px}
.title{font-family:var(--font-head);font-size:16px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.title span{color:var(--amber)}
.sub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.hflex{flex:1}
.ctx-badge{display:none;align-items:center;gap:6px;background:var(--amber-dim);border:1px solid rgba(245,166,35,.25);border-radius:4px;padding:4px 10px;font-size:11px;font-family:var(--mono);color:var(--amber)}
.ctx-badge.on{display:flex}
.ctx-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-new{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-new:hover{border-color:var(--amber);color:var(--amber)}
/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-label{padding:14px 16px 6px;font-family:var(--font-head);font-size:10px;font-weight:500;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.qbtn{display:block;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid rgba(44,48,56,.6);color:var(--dim);font-family:var(--font);font-size:12.5px;padding:8px 16px;cursor:pointer;transition:all .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qbtn:hover{background:var(--amber-glow);color:var(--amber);padding-left:20px}
.qbtn .i{margin-right:6px;opacity:.7}
.sb-foot{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);font-size:11px;font-family:var(--mono);color:var(--muted)}
.sb-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle}
/* Chat */
.chat{display:flex;flex-direction:column;min-height:0}
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);text-align:center}
.welcome h2{font-family:var(--font-head);font-size:20px;font-weight:500;letter-spacing:.05em;color:var(--dim);text-transform:uppercase}
.welcome p{font-size:13px;max-width:320px;line-height:1.7}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px;max-width:460px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
/* Messages */
.msg{display:flex;gap:10px;max-width:840px;animation:msgIn .18s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:70%}
.av{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}
.msg.user .av{background:var(--user-border);color:#fff}
.msg.ai .av{background:var(--amber-dim);border:1px solid rgba(245,166,35,.3);color:var(--amber)}
.mbody{display:flex;flex-direction:column;gap:5px;min-width:0}
.bubble{padding:10px 14px;border-radius:6px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(--user-bg);border:1px solid var(--user-border);color:#dce8f5;border-radius:6px 2px 6px 6px}
.msg.ai  .bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:2px 6px 6px 6px}
/* Meta row */
.meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.c-high  {background:var(--green-dim); color:var(--green); border:1px solid rgba(74,222,128,.25)}
.c-medium{background:var(--amber-dim); color:var(--amber); border:1px solid rgba(245,166,35,.25)}
.c-low   {background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.25)}
.c-none  {background:var(--red-dim);   color:#f87171;      border:1px solid rgba(248,113,113,.25)}
.src-count{font-family:var(--mono);font-size:10px;color:var(--muted)}
/* Sources */
.sources{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.src{font-family:var(--mono);font-size:10px;padding:2px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;transition:color .12s,border-color .12s}
.src:hover{color:var(--amber);border-color:rgba(245,166,35,.3)}
.src a{color:inherit;text-decoration:none} .src-dl{margin-left:5px;opacity:.5;font-size:9px;cursor:pointer;transition:opacity .15s} .src-dl:hover{opacity:1}

/* Typing */
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:2px 6px 6px 6px;width:fit-content}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typ 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typ{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
/* Input */
.input-bar{padding:12px 24px 16px;background:var(--bg);border-top:1px solid var(--border)}
.input-row{display:flex;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 8px 7px 14px;transition:border-color .15s}
.input-row:focus-within{border-color:rgba(245,166,35,.5);box-shadow:0 0 0 3px rgba(245,166,35,.05)}
#qi{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:14px;resize:none;min-height:22px;max-height:100px;overflow-y:auto;line-height:1.5}
#qi::placeholder{color:var(--muted)}
#send{background:var(--amber);border:none;border-radius:5px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;transition:background .15s,transform .1s}
#send:hover{background:#e09520}
#send:active{transform:scale(.94)}
#send:disabled{background:var(--border);cursor:not-allowed}
#send svg{width:15px;height:15px;fill:#000}
.hint{font-size:11px;color:var(--muted);margin-top:6px;font-family:var(--mono);text-align:center}
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 9L12 3L21 9V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9Z" fill="#000"/><path d="M12 6L6 9.5V19H9V14H15V19H18V9.5L12 6Z" fill="#f5a623" opacity=".6"/></svg>
  </div>
  <div>
    <div class="title">Madison <span>Ave</span> Construction</div>
    <div class="sub">JOB INTELLIGENCE v4.0</div>
  </div>
  <div class="hflex"></div>
  <div class="ctx-badge" id="ctxBadge"><span class="ctx-dot"></span><span id="ctxLabel"></span></div>
  <button class="btn-new" onclick="newChat()">+ New Chat</button>
</header>

<aside class="sidebar">
  <div class="sb-label">Quick Questions</div>
  <button class="qbtn" onclick="sq('Any permits expiring soon?')"><span class="i">🏗️</span>Permits</button>
  <button class="qbtn" onclick="sq('What loans and draws are on record?')"><span class="i">💰</span>Loans & Draws</button>
  <button class="qbtn" onclick="sq('Who are the owners of record?')"><span class="i">👤</span>Owners</button>
  <button class="qbtn" onclick="sq('Summarize the most recent appraisal')"><span class="i">📊</span>Appraisals</button>
  <button class="qbtn" onclick="sq('What inspections are on file?')"><span class="i">✅</span>Inspections</button>
  <button class="qbtn" onclick="sq('Who are the lenders on our jobs?')"><span class="i">🏦</span>Lenders</button>
  <button class="qbtn" onclick="sq('What jobs and properties are indexed?')"><span class="i">🗂️</span>What''s Indexed</button>
  <button class="qbtn" onclick="sq('Any flood zone properties?')"><span class="i">💧</span>Flood Zones</button>
  <div class="sb-foot"><span class="sb-dot"></span>Vertex AI · Gemini 1.5 Flash</div>
</aside>

<main class="chat">
  <div class="messages" id="msgs">
    <div class="welcome" id="welcome">
      <div style="font-size:34px">🏗️</div>
      <h2>Job Intelligence</h2>
      <p>Ask anything about your jobs, permits, loans, appraisals, or documents.</p>
      <div class="chips">
        <span class="chip" onclick="sq('summarize northridge')">Summarize Northridge</span>
        <span class="chip" onclick="sq('Any permits expiring soon?')">Permit status</span>
        <span class="chip" onclick="sq('What draws were made on the Northridge loan?')">Loan draws</span>
        <span class="chip" onclick="sq('Who is the owner at 15 Northridge Dr?')">Owner of record</span>
        <span class="chip" onclick="sq('What lender is on the Northridge property?')">Lender</span>
      </div>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-row">
      <textarea id="qi" rows="1" placeholder="Ask about any job, permit, loan, or document…" onkeydown="hk(event)" oninput="ar(this)"></textarea>
      <button id="send" onclick="send()" title="Send"><svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg></button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line</div>
  </div>
</main>
</div>

<script>
let SID = null;

async function initSession(){
  try{
    const r = await fetch('/api/chat/new',{method:'POST'});
    const d = await r.json();
    SID = d.session_id;
  }catch(e){ console.error('[Chat] Session init failed:',e); }
}

async function newChat(){
  await initSession();
  document.getElementById('msgs').innerHTML='';
  const w = document.createElement('div'); w.id='welcome'; w.className='welcome';
  w.innerHTML=`<div style="font-size:34px">🏗️</div><h2>Job Intelligence</h2><p>Ask anything about your jobs, permits, loans, appraisals, or documents.</p>`;
  document.getElementById('msgs').appendChild(w);
  document.getElementById('ctxBadge').classList.remove('on');
  document.getElementById('qi').focus();
}

function esc(s){const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}

function hideWelcome(){const w=document.getElementById('welcome');if(w)w.style.display='none';}

function appendUser(text){
  hideWelcome();
  const m=document.getElementById('msgs');
  const d=document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="av">BOB</div><div class="mbody"><div class="bubble">${esc(text)}</div></div>`;
  m.appendChild(d); scroll();
}

function appendTyping(){
  hideWelcome();
  const m=document.getElementById('msgs');
  const d=document.createElement('div'); d.className='msg ai'; d.id='typing';
  d.innerHTML=`<div class="av">MAC</div><div class="mbody"><div class="typing"><span></span><span></span><span></span></div></div>`;
  m.appendChild(d); scroll();
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function appendAI(data){
  var m=document.getElementById('msgs');
  var conf=data.confidence||'none';
  var badges={high:'OK',medium:'~',low:'Low',none:'No sources'};
  var clabel=badges[conf]||conf;
  var sources=data.sources||[];

  // Source panel HTML — numbered to match [1][2] in answer
  var srcPanel='';
  if(sources.length){
    srcPanel='<div style="margin-top:8px;padding:8px 10px;background:#1a1e24;border:1px solid #2c3038;border-radius:5px;display:flex;flex-direction:column;gap:5px">';
    srcPanel+='<div style="font-size:10px;font-family:IBM Plex Mono,monospace;color:#6b7280;margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em">Sources</div>';
    for(var i=0;i<sources.length;i++){
      var s=sources[i];
      var title=typeof s==='object'?(s.title||s.source||'Document'):String(s);
      var uri=typeof s==='object'?(s.uri||''):'';
      var num='['+(i+1)+'] ';
      var dlBtn='';
      if(title){
        dlBtn=' <a href="/api/download?title='+encodeURIComponent(title)+'" '
          +'style="display:inline-block;background:#f5a623;color:#000;font-size:10px;'
          +'padding:2px 8px;border-radius:3px;text-decoration:none;font-weight:600;'
          +'margin-left:6px;font-family:IBM Plex Mono,monospace" title="Download '+esc(title)+'">⬇ Download</a>';
      }
      srcPanel+='<div style="font-size:12px;font-family:IBM Plex Mono,monospace;color:#9aa0a8;display:flex;align-items:center;flex-wrap:wrap">'
        +'<span style="color:#f5a623;font-weight:600;margin-right:2px">'+num+'</span>'
        +esc(title)+dlBtn+'</div>';
    }
    srcPanel+='</div>';
  }

  var d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML='<div class="av">MAC</div><div class="mbody">'
    +'<div class="bubble">'+esc(data.answer)+'</div>'
    +'<div class="meta">'
    +'<span class="badge c-'+conf+'">'+clabel+'</span>'
    +(data.search_results>0?' <span class="src-count">'+data.search_results+' doc'+(data.search_results!==1?'s':'')+'</span>':'')
    +'</div>'
    +srcPanel
    +'</div>';
  m.appendChild(d); scroll();
}

function appendErr(msg){
  const m=document.getElementById('msgs');
  const d=document.createElement('div'); d.className='msg ai';
  d.innerHTML=`<div class="av">MAC</div><div class="mbody"><div class="bubble" style="color:#f87171;border-color:rgba(248,113,113,.3)">⚠ ${esc(msg)}</div></div>`;
  m.appendChild(d); scroll();
}

async function send(){
  const inp=document.getElementById('qi');
  const q=inp.value.trim(); if(!q)return;
  if(!SID) await initSession();
  inp.value=''; ar(inp);
  document.getElementById('send').disabled=true;
  appendUser(q); appendTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,session_id:SID})});
    const data=await r.json(); removeTyping();
    if(data.error){appendErr(data.error);}
    else{
      if(data.session_id) SID=data.session_id;
      if(data.job_context){
        document.getElementById('ctxLabel').textContent=data.job_context;
        document.getElementById('ctxBadge').classList.add('on');
      }
      appendAI(data);
    }
  }catch(e){removeTyping();appendErr('Network error — is the server running?');}
  finally{document.getElementById('send').disabled=false;inp.focus();}
}

function sq(text){document.getElementById('qi').value=text;send();}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function scroll(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}

initSession();
document.getElementById('qi').focus();
</script>
</body>
</html>

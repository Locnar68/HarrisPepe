  display_name: Madison Ave OneDrive Docs
  industry_vertical: GENERIC
  solution_types: [SOLUTION_TYPE_CHAT, SOLUTION_TYPE_SEARCH]
  content_config: CONTENT_REQUIRED

engine:
  id: madison-ave-onedrive-ds_1776720944393_gcs_store
  display_name: Madison Ave OneDrive Search
  search_tier: SEARCH_TIER_STANDARD
  search_add_ons: [SEARCH_ADD_ON_LLM]

metadata:
  properties_folder: Doorloop
  category_folders:
    "files":  document
    "photos": image
  heuristic_classification: true
  default_property: unknown
  heuristic_rules:
    - { pattern: "\\.(jpg|jpeg|png|gif|bmp|tiff|webp)$",        doc_type: image }
    - { pattern: "invoice|inv[_\\s-]|receipt|payment",           doc_type: billing }
    - { pattern: "permit|inspection|certificate|occupancy",       doc_type: permit }
    - { pattern: "closing|deed|title|llc|entity|sale|flip",      doc_type: legal }
    - { pattern: "p&l|statement|appraisal|bank|financial|loan",  doc_type: finance }
    - { pattern: "lease|tenant|rent|renewal|agreement",          doc_type: lease }
    - { pattern: ".",                                            doc_type: document }

connectors:
  drive:
    enabled: false
  gmail:
    enabled: false
  onedrive:
    enabled: true
  local_files:
    enabled: false
  csv:
    enabled: false
